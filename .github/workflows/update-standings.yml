name: Update Tournament Data

on:
  workflow_dispatch:
  schedule:
    # Tournament window: Fri May 29 evening + Sat May 30 all day CDT (UTC-5)
    # Friday 5pm–midnight CDT = Fri 22:00–Sat 05:00 UTC
    - cron: '0 22,23 * * 5'    # Fri 5pm, 6pm CDT
    - cron: '0 0-4 * * 6'      # Fri 7pm–11pm CDT
    # Saturday 7am–9pm CDT = Sat 12:00–Sun 02:00 UTC
    - cron: '0 12-23 * * 6'    # Sat 7am–6pm CDT
    - cron: '0 0-2 * * 0'      # Sat 7pm–9pm CDT
    # Sunday 7am–9pm CDT = Sun 12:00–Mon 02:00 UTC
    - cron: '0 12-23 * * 0'    # Sun 7am–6pm CDT
    - cron: '0 0-2 * * 1'      # Sun 7pm–9pm CDT

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch tournament data
        run: node parse-state.mjs

      - name: Update HTML
        run: node update-html.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html state-data.json
          git diff --staged --quiet || (git commit -m "chore: update tournament data [skip ci]" && git push)
