name: Update Standings

on:
  schedule:
    - cron: '0 12 * * *'  # 7 AM CT daily
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch league games
        run: node parse-games.mjs

      - name: Fetch tournament games
        run: node parse-tournament-games.mjs

      - name: Compute RRI
        run: node compute-rri.mjs

      - name: Update HTML
        run: node update-html.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Auto-update standings $(date -u +%Y-%m-%d)" && git push)
