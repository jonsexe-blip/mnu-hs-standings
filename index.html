<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 MN HS Open D1 State</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surf:#fff;--surf2:#f6f8fa;
  --border:#d0d7de;--text:#1f2328;--muted:#656d76;
  --accent:#e05c1b;--navy:#1a2332;
  --pool-a:#0969da;--pool-b:#8250df;--pool-c:#1a7f37;--pool-d:#e05c1b;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.site-header{background:var(--navy);padding:16px 20px}
.site-header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:14px}
.site-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0}
.site-title{font-size:18px;font-weight:700;color:#fff;line-height:1.2}
.site-subtitle{font-size:13px;color:rgba(255,255,255,.6);margin-top:2px}
.site-updated{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px}
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tabs::-webkit-scrollbar{height:0}
.tab-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;padding:12px 14px;position:relative;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.tab-pane{display:none;max-width:900px;margin:0 auto;padding:20px}
.tab-pane.active{display:block}
/* POOLS */
.pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.pool-grid{grid-template-columns:1fr}}
.pool-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.pool-card-header{padding:10px 16px;font-weight:700;font-size:12px;letter-spacing:.07em;text-transform:uppercase;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.pool-a .pool-card-header{border-left:3px solid var(--pool-a)}
.pool-b .pool-card-header{border-left:3px solid var(--pool-b)}
.pool-c .pool-card-header{border-left:3px solid var(--pool-c)}
.pool-d .pool-card-header{border-left:3px solid var(--pool-d)}
.pool-col-hdr{display:grid;grid-template-columns:1fr 44px 44px 56px;padding:4px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--surf2)}
.pool-col-hdr span{text-align:center}.pool-col-hdr span:first-child{text-align:left}
.pool-row{display:grid;grid-template-columns:1fr 44px 44px 56px;padding:9px 16px;align-items:center;border-bottom:1px solid var(--border)}
.pool-row:last-child{border-bottom:none}
.pool-row.leader{background:rgba(9,105,218,.04)}
.pool-team{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;min-width:0}
.pool-team-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pool-logo{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--surf2);flex-shrink:0;border:1px solid var(--border)}
.pool-logo-ph{width:26px;height:26px;border-radius:50%;background:var(--surf2);display:inline-block;flex-shrink:0;border:1px solid var(--border)}
.pool-stat{text-align:center;font-size:13px;color:var(--muted)}.pool-stat.on{color:var(--text)}
.pool-rank{font-size:11px;color:var(--muted);width:14px;text-align:right;flex-shrink:0}
/* SECTION HEADER */
.sec-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-hdr:first-child{padding-top:0}
.pip{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pip-a{background:var(--pool-a)}.pip-b{background:var(--pool-b)}.pip-c{background:var(--pool-c)}.pip-d{background:var(--pool-d)}.pip-brkt{background:var(--accent)}
/* GAME CARD — UFA vertical style */
.game-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.gc-hdr{background:var(--surf2);padding:5px 14px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between;border-bottom:1px solid var(--border)}
.gc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:8px}
.gc-row:not(:last-child){border-bottom:1px solid var(--border)}
.gc-team{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:500;min-width:0;flex:1}
.gc-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.gc-score{font-size:18px;font-weight:700;flex-shrink:0;min-width:28px;text-align:right}
.gc-score.tbd{font-size:13px;font-weight:400;color:var(--muted)}
.gc-row.won .gc-name{font-weight:700}
.gc-row.lost .gc-name{color:var(--muted)}
.gc-row.lost .gc-score{color:var(--muted)}
.g-logo{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--surf2);flex-shrink:0;border:1px solid var(--border)}
.g-logo-ph{width:30px;height:30px;border-radius:50%;background:var(--surf2);display:inline-block;flex-shrink:0;border:1px solid var(--border)}
/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.empty h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
/* BRACKET */
.brkt-section{margin-bottom:32px}
.brkt-title{font-size:15px;font-weight:700;margin-bottom:3px}
.brkt-note{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.brkt-scroll{overflow-x:auto;padding-bottom:4px}
.brkt-tree{display:flex;height:380px}
.brkt-round{position:relative;width:240px;flex-shrink:0}
.brkt-conn{position:relative;width:40px;flex-shrink:0;height:380px}
.brkt-matchup{position:absolute;left:0;right:0;background:var(--surf);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.bm-row{display:flex;align-items:center;gap:7px;padding:0 10px;height:37px;font-size:13px;font-weight:500}
.bm-row:not(:last-child){border-bottom:1px solid var(--border)}
.bm-row.tbd{color:var(--muted);font-style:italic}
.bm-row.won{font-weight:700}
.bm-row.lost{color:var(--muted)}
.bm-seed{font-size:10px;color:var(--muted);font-style:normal;min-width:20px;flex-shrink:0;font-weight:700}
.bm-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.bm-score{font-size:14px;font-weight:700;flex-shrink:0;min-width:20px;text-align:right}
.bm-score.tbd{color:var(--muted);font-weight:400}
.bm-logo{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.bm-logo-ph{width:24px;height:24px;border-radius:50%;background:var(--surf2);flex-shrink:0;border:1px solid var(--border);display:inline-block}
.b-line{position:absolute;background:var(--border)}
.b-h{height:2px}
.b-v{width:2px}
.brkt-placements{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;align-items:flex-start}
.place-wrap{flex:0 0 auto}
.place-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding:0 2px}
</style>
</head>

(function(){
  var dt=new Date(STATE_DATA.updatedAt),diff=Math.floor((Date.now()-dt)/60000),label;
  if(diff<2)label='just now';
  else if(diff<60)label=diff+' min ago';
  else if(diff<120)label='1 hour ago';
  else if(diff<1440)label=Math.floor(diff/60)+' hours ago';
  else label=Math.floor(diff/1440)+' days ago';
  document.getElementById('updatedAt').textContent='Updated '+label;
})();

function logo(src,name,cls,ph){
  if(!src)return '<span class="'+ph+'"></span>';
  return '<img class="'+cls+'" src="'+src+'" alt="'+name+'" onerror="this.style.display=\'none\'">';
}
function fmtDate(s){var m=s&&s.match(/(\w+), (\d+) (\w+)/);return m?m[1]+' '+m[3]+' '+m[2]:(s||'');}

// POOLS
(function(){
  var html=['A','B','C','D'].map(function(p){
    var rows=(STATE_DATA.pools[p]||[]).map(function(t,i){
      var gp=t.w+t.l,pd=gp>0?(t.pd>0?'+':'')+t.pd:'—',pfpa=gp>0?t.pf+'/'+t.pa:'—';
      return '<div class="pool-row'+(i===0?' leader':'')+'">'+

        '<div class="pool-stat'+(gp>0?' on':'')+'">'+t.w+'-'+t.l+'</div>'+

        '<div class="pool-stat'+(gp>0?' on':'')+'">'+pfpa+'</div></div>';
    }).join('');
    return '<div class="pool-card pool-'+p.toLowerCase()+'">'+
      '<div class="pool-card-header">Pool '+p+'</div>'+
      '<div class="pool-col-hdr"><span>Team</span><span>W-L</span><span>PD</span><span>PF/PA</span></div>'+
      rows+'</div>';
  }).join('');
  document.getElementById('poolGrid').innerHTML=html;
})();

// GAME CARD
function gameCard(g){
  var done=g.completed,t1w=done&&g.score1>g.score2,t2w=done&&g.score2>g.score1;
  var pool=g.pool?'Pool '+g.pool+' · ':'';
  var hdr=pool+fmtDate(g.date)+' · '+g.time;
  return '<div class="game-card">'+
    '<div class="gc-hdr"><span>'+hdr+'</span></div>'+
    '<div class="gc-row'+(t1w?' won':t2w?' lost':'')+'">'+
    '<div class="gc-team">'+logo(g.logo1,g.team1,'g-logo','g-logo-ph')+'<span class="gc-name">'+g.team1+'</span></div>'+
    '<div class="gc-score'+(done?'':' tbd')+'">'+(done?g.score1:'&mdash;')+'</div></div>'+
    '<div class="gc-row'+(t2w?' won':t1w?' lost':'')+'">'+
    '<div class="gc-team">'+logo(g.logo2,g.team2,'g-logo','g-logo-ph')+'<span class="gc-name">'+g.team2+'</span></div>'+
    '<div class="gc-score'+(done?'':' tbd')+'">'+(done?g.score2:'&mdash;')+'</div></div></div>';
}

// SCHEDULE
(function(){
  var el=document.getElementById('scheduleContent'),games=STATE_DATA.poolGames;
  if(!games.length){el.innerHTML='<div class="empty"><h3>Schedule not yet available</h3></div>';return;}
  var PIP={A:'pip-a',B:'pip-b',C:'pip-c',D:'pip-d'};
  var html=['A','B','C','D'].map(function(p){
    var pg=games.filter(function(g){return g.pool===p;});
    return pg.length?'<div class="sec-hdr"><span class="pip '+PIP[p]+'"></span>Pool '+p+'</div>'+pg.map(gameCard).join(''):'';
  }).join('');
  if(STATE_DATA.bracketGames.length)
    html+='<div class="sec-hdr"><span class="pip pip-brkt"></span>Bracket</div>'+STATE_DATA.bracketGames.map(gameCard).join('');
  el.innerHTML=html;
})();

// SCORES
(function(){
  var el=document.getElementById('scoresContent');
  var done=STATE_DATA.poolGames.concat(STATE_DATA.bracketGames).filter(function(g){return g.completed;}).reverse();
  el.innerHTML=done.length?done.map(gameCard).join(''):'<div class="empty"><h3>No scores yet</h3><p>Check back Friday evening.</p></div>';
})();

// BRACKET
(function(){
  var el=document.getElementById('bracketContent');
  var poolDone=STATE_DATA.poolGames.length>0&&STATE_DATA.poolGames.every(function(g){return g.completed;});

  var MH=76;

  function hl(x1,x2,y){return '<div class="b-line b-h" style="left:'+x1+'px;width:'+(x2-x1)+'px;top:'+(y-1)+'px"></div>';}
  function vl(x,y1,y2){return '<div class="b-line b-v" style="left:'+(x-1)+'px;top:'+y1+'px;height:'+(y2-y1)+'px"></div>';}
  function conn2to1(c1,c2,fc){return hl(0,20,c1)+hl(0,20,c2)+vl(20,c1,c2)+hl(20,40,fc);}

  function poolEntry(seed){return(STATE_DATA.pools[seed[0]]||[])[parseInt(seed[1])-1]||null;}
  function bmLogo(src,name){
    if(!src)return '<span class="bm-logo-ph"></span>';
    return '<img class="bm-logo" src="'+src+'" alt="'+name+'" onerror="this.style.display=\'none\'">';
  }
  function findBG(n1,n2){
    return STATE_DATA.bracketGames.find(function(g){
      return(g.team1===n1&&g.team2===n2)||(g.team1===n2&&g.team2===n1);
    })||null;
  }

  // Team descriptor: name=display name (null→TBD), logo, label=seed like 'A1'
  function T(n,l,lb){return{name:n||null,logo:l||'',label:lb||''};}

  function slot(t1,t2,top){
    var n1=t1.name,l1=t1.logo,lb1=t1.label;
    var n2=t2.name,l2=t2.logo,lb2=t2.label;
    var g=(n1&&n2)?findBG(n1,n2):null;
    var done=g&&g.completed;
    if(g&&g.team1===n2){var x;x=n1;n1=n2;n2=x;x=l1;l1=l2;l2=x;x=lb1;lb1=lb2;lb2=x;}
    if(g){l1=g.logo1||l1;l2=g.logo2||l2;}
    var w1=done&&g.score1>g.score2,w2=done&&g.score2>g.score1;
    function row(nm,logo,lb,won,lost,sc){
      return '<div class="bm-row'+(won?' won':lost?' lost':(nm?'':' tbd'))+'">'+
        (nm?bmLogo(logo,nm):'<span class="bm-logo-ph"></span>')+
        (lb?'<span class="bm-seed">'+lb+'</span>':'')+
        '<span class="bm-name">'+(nm||lb||'TBD')+'</span>'+
        '<span class="bm-score'+(done?'':' tbd')+'">'+(done?sc:'')+'</span></div>';
    }
    return '<div class="brkt-matchup" style="top:'+top+'px">'+
      row(n1,l1,lb1,w1,done&&!w1,done?g.score1:'')+
      row(n2,l2,lb2,w2,done&&!w2,done?g.score2:'')+
      '</div>';
  }

  function qfSlot(s1,s2,top){
    var e1=poolEntry(s1),e2=poolEntry(s2);
    var t1=poolDone?T(e1?e1.team:null,e1?e1.logo:'',s1):T(null,'',s1);
    var t2=poolDone?T(e2?e2.team:null,e2?e2.logo:'',s2):T(null,'',s2);
    return slot(t1,t2,top);
  }

  function qfResult(s1,s2){
    if(!poolDone)return null;
    var e1=poolEntry(s1),e2=poolEntry(s2);
    if(!e1||!e2)return null;
    var g=findBG(e1.team,e2.team);
    if(!g||!g.completed)return null;
    var w=g.score1>g.score2;
    return{
      winner:T(w?g.team1:g.team2,w?g.logo1:g.logo2,''),
      loser:T(w?g.team2:g.team1,w?g.logo2:g.logo1,'')
    };
  }

  function gameResult(t1,t2){
    if(!t1||!t1.name||!t2||!t2.name)return null;
    var g=findBG(t1.name,t2.name);
    if(!g||!g.completed)return null;
    var w=g.score1>g.score2;
    return{
      winner:T(w?g.team1:g.team2,w?(g.logo1||t1.logo):(g.logo2||t2.logo),''),
      loser:T(w?g.team2:g.team1,w?(g.logo2||t2.logo):(g.logo1||t1.logo),'')
    };
  }

  function bracketBlock(title,note,qfPairs,placeLabels){
    var QT=[0,100,200,300],QC=[38,138,238,338];
    var ST=[50,250],SC=[88,288];
    var FT=150,FC=188;

    var qf=qfPairs.map(function(p){return qfResult(p[0],p[1]);});

    // SF teams = QF winners (adjacent pairs)
    var sf1=[qf[0]?qf[0].winner:T(null,'',''),qf[1]?qf[1].winner:T(null,'','')];
    var sf2=[qf[2]?qf[2].winner:T(null,'',''),qf[3]?qf[3].winner:T(null,'','')];
    var sfr1=gameResult(sf1[0],sf1[1]),sfr2=gameResult(sf2[0],sf2[1]);

    // Final teams = SF winners
    var fin=[sfr1?sfr1.winner:T(null,'',''),sfr2?sfr2.winner:T(null,'','')];

    // Main QF→SF→Final tree
    var qfH=qfPairs.map(function(p,i){return qfSlot(p[0],p[1],QT[i]);}).join('');
    var sfH=slot(sf1[0],sf1[1],ST[0])+slot(sf2[0],sf2[1],ST[1]);
    var finH=slot(fin[0],fin[1],FT);
    var mainTree='<div class="brkt-tree" style="height:380px">'+
      '<div class="brkt-round">'+qfH+'</div>'+
      '<div class="brkt-conn">'+conn2to1(QC[0],QC[1],SC[0])+conn2to1(QC[2],QC[3],SC[1])+'</div>'+
      '<div class="brkt-round">'+sfH+'</div>'+
      '<div class="brkt-conn">'+conn2to1(SC[0],SC[1],FC)+'</div>'+
      '<div class="brkt-round">'+finH+'</div>'+
      '</div>';

    // 3rd Place: losers of the two SFs
    var t3a=sfr1?sfr1.loser:T(null,'',''),t3b=sfr2?sfr2.loser:T(null,'','');
    var third='<div class="place-wrap">'+
      '<div class="place-label">'+placeLabels[0]+'</div>'+
      '<div class="brkt-scroll"><div class="brkt-round" style="height:'+MH+'px">'+slot(t3a,t3b,0)+'</div></div></div>';

    // 5th Place: QF losers play 2-round mini bracket (SF1, SF2 → Final)
    var f5=[
      qf[0]?qf[0].loser:T(null,'',''),qf[1]?qf[1].loser:T(null,'',''),
      qf[2]?qf[2].loser:T(null,'',''),qf[3]?qf[3].loser:T(null,'','')
    ];
    var f5sf1r=gameResult(f5[0],f5[1]),f5sf2r=gameResult(f5[2],f5[3]);
    var f5fin=[f5sf1r?f5sf1r.winner:T(null,'',''),f5sf2r?f5sf2r.winner:T(null,'','')];
    var fifth='<div class="place-wrap">'+
      '<div class="place-label">'+placeLabels[1]+'</div>'+
      '<div class="brkt-scroll"><div class="brkt-tree" style="height:180px">'+
        '<div class="brkt-round">'+slot(f5[0],f5[1],0)+slot(f5[2],f5[3],100)+'</div>'+
        '<div class="brkt-conn" style="height:180px">'+conn2to1(38,138,88)+'</div>'+
        '<div class="brkt-round">'+slot(f5fin[0],f5fin[1],50)+'</div>'+
      '</div></div></div>';

    // 7th Place: losers of the two 5th-place SFs
    var t7a=f5sf1r?f5sf1r.loser:T(null,'',''),t7b=f5sf2r?f5sf2r.loser:T(null,'','');
    var seventh='<div class="place-wrap">'+
      '<div class="place-label">'+placeLabels[2]+'</div>'+
      '<div class="brkt-scroll"><div class="brkt-round" style="height:'+MH+'px">'+slot(t7a,t7b,0)+'</div></div></div>';

    return '<div class="brkt-section">'+
      '<div class="brkt-title">'+title+'</div>'+
      '<div class="brkt-note">'+note+'</div>'+
      '<div class="brkt-scroll">'+mainTree+'</div>'+
      '<div class="brkt-placements">'+third+fifth+seventh+'</div>'+
      '</div>';
  }

  var preNote=' &middot; Team names appear after pool play concludes';
  // Seedings confirmed from mnyu.ultimatecentral.com bracket page
  var CHAMP=[['A1','B2'],['D1','C2'],['C1','D2'],['B1','A2']];
  var CONSOL=[['A3','B4'],['D3','C4'],['C3','D4'],['B3','A4']];

  el.innerHTML=
    bracketBlock('Championship Bracket','Top 2 from each pool'+(poolDone?'':preNote),CHAMP,['3rd Place','5th Place','7th Place'])+
    bracketBlock('Consolation Bracket','Seeds 3&ndash;4 from each pool'+(poolDone?'':preNote),CONSOL,['11th Place','13th Place','15th Place']);
})();
</script>
</body>
</html>
