<title>2026 MN HS Open D1 State</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --accent:#f0883e;--green:#3fb950;--red:#f85149;
  --pool-a:#388bfd;--pool-b:#a371f7;--pool-c:#3fb950;--pool-d:#f0883e;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* HEADER */
.site-header{background:var(--surf);border-bottom:1px solid var(--border);padding:16px 20px}
.site-header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:14px}
.site-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0}
.site-title{font-size:18px;font-weight:700;line-height:1.2}
.site-subtitle{font-size:13px;color:var(--muted);margin-top:2px}
.site-updated{font-size:12px;color:var(--muted);margin-top:3px}

/* TABS */
.tabs{background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:4px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:3px}
.tab-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;padding:12px 16px;position:relative;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}

/* PANES */
.tab-pane{display:none;max-width:900px;margin:0 auto;padding:20px}
.tab-pane.active{display:block}

/* POOL GRID */
.pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.pool-grid{grid-template-columns:1fr}}
.pool-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.pool-card-header{padding:10px 16px;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px;border-bottom:2px solid}
.pool-a .pool-card-header{border-color:var(--pool-a)}
.pool-b .pool-card-header{border-color:var(--pool-b)}
.pool-c .pool-card-header{border-color:var(--pool-c)}
.pool-d .pool-card-header{border-color:var(--pool-d)}
.pool-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pool-a .pool-dot{background:var(--pool-a)}
.pool-b .pool-dot{background:var(--pool-b)}
.pool-c .pool-dot{background:var(--pool-c)}
.pool-d .pool-dot{background:var(--pool-d)}
.pool-col-hdr{display:grid;grid-template-columns:1fr 40px 40px 56px;padding:4px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.pool-col-hdr span{text-align:center}
.pool-col-hdr span:first-child{text-align:left}
.pool-row{display:grid;grid-template-columns:1fr 40px 40px 56px;padding:8px 16px;align-items:center;border-bottom:1px solid var(--border)}
.pool-row:last-child{border-bottom:none}
.pool-row.leader{background:rgba(255,255,255,.03)}
.pool-team{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;min-width:0}
.pool-team-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pool-logo{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--surf2);flex-shrink:0}
.pool-logo-placeholder{width:28px;height:28px;border-radius:50%;background:var(--surf2);display:inline-block;flex-shrink:0}
.pool-stat{text-align:center;font-size:13px;color:var(--muted)}
.pool-stat.active{color:var(--text)}
.pool-rank{font-size:12px;color:var(--muted);width:16px;text-align:right;flex-shrink:0}

/* SCHEDULE / SCORES */
.section-hdr{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.section-hdr:first-child{padding-top:0}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.pool-a-dot{background:var(--pool-a)}
.pool-b-dot{background:var(--pool-b)}
.pool-c-dot{background:var(--pool-c)}
.pool-d-dot{background:var(--pool-d)}
.bracket-dot{background:var(--accent)}

/* GAME CARD */
.game-card{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.game-team{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;min-width:0}
.game-team.right{flex-direction:row-reverse;text-align:right}
.game-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--surf2);flex-shrink:0}
.game-logo-placeholder{width:32px;height:32px;border-radius:50%;background:var(--surf2);display:inline-block;flex-shrink:0}
.game-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.game-team.winner .game-name{color:var(--text);font-weight:700}
.game-team.loser .game-name{color:var(--muted)}
.game-score-box{text-align:center;min-width:72px;flex-shrink:0}
.game-score{font-size:20px;font-weight:700;letter-spacing:1px;display:flex;justify-content:center;align-items:center;gap:2px}
.game-score .s{min-width:22px;text-align:center}
.game-score .sep{color:var(--muted);font-weight:300;padding:0 2px}
.game-score.w1 .s1{color:var(--text)}
.game-score.w1 .s2{color:var(--muted)}
.game-score.w2 .s2{color:var(--text)}
.game-score.w2 .s1{color:var(--muted)}
.game-time-label{font-size:12px;color:var(--muted);margin-top:3px}
.game-vs{font-size:13px;color:var(--muted);margin-bottom:2px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}

/* BRACKET */
.bracket-note{color:var(--muted);font-size:13px;padding:0 0 16px;line-height:1.5}
.bracket-card{background:var(--surf);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:8px}
.bracket-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;gap:8px}
.bracket-row:not(:last-child){border-bottom:1px solid var(--border)}
.bracket-team{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.bracket-team.winner{color:var(--text);font-weight:700}
.bracket-team.loser{color:var(--muted)}
.bracket-team.tbd{color:var(--muted);font-style:italic}
.bracket-score{font-size:16px;font-weight:700}
.bracket-score.tbd{color:var(--muted)}
.bracket-time{font-size:11px;color:var(--muted);padding:5px 14px;background:rgba(0,0,0,.2);text-align:right}
</style>
</head>

  let label;
  if (diff < 2) label = 'just now';
  else if (diff < 60) label = diff + ' minutes ago';
  else if (diff < 120) label = '1 hour ago';
  else if (diff < 1440) label = Math.floor(diff/60) + ' hours ago';
  else label = Math.floor(diff/1440) + ' days ago';
  document.getElementById('updatedAt').textContent = 'Updated ' + label;
})();

// Logo img helper
function logoImg(src, name, cls) {
  var phCls = cls === 'game-logo' ? 'game-logo-placeholder' : 'pool-logo-placeholder';
  if (!src) return '<span class="' + phCls + '"></span>';
  return '<img class="' + cls + '" src="' + src + '" alt="' + name + '" onerror="this.style.display=\'none\'">';
}

// Date formatter: "Fri, 29 May 2026" -> "Fri May 29"
function fmtDate(s) {
  var m = s && s.match(/(\w+), (\d+) (\w+)/);
  return m ? m[1] + ' ' + m[3] + ' ' + m[2] : (s || '');
}

// POOLS TAB
(function() {
  var POOL_COLORS = {A:'pool-a',B:'pool-b',C:'pool-c',D:'pool-d'};
  var html = ['A','B','C','D'].map(function(p) {
    var teams = STATE_DATA.pools[p] || [];
    var rows = teams.map(function(t, i) {
      var gp = t.w + t.l;
      var pdStr = gp > 0 ? (t.pd > 0 ? '+' : '') + t.pd : '—';
      var pfpaStr = gp > 0 ? t.pf + '/' + t.pa : '—';
      return '<div class="pool-row' + (i===0?' leader':'') + '">' +
        '<div class="pool-team"><span class="pool-rank">' + (i+1) + '</span>' +
        logoImg(t.logo, t.team, 'pool-logo') +
        '<span class="pool-team-name">' + t.team + '</span></div>' +
        '<div class="pool-stat' + (gp>0?' active':'') + '">' + t.w + '-' + t.l + '</div>' +
        '<div class="pool-stat' + (gp>0&&t.pd>0?' active':'') + '">' + pdStr + '</div>' +
        '<div class="pool-stat' + (gp>0?' active':'') + '">' + pfpaStr + '</div>' +
        '</div>';
    }).join('');
    return '<div class="pool-card ' + POOL_COLORS[p] + '">' +
      '<div class="pool-card-header"><span class="pool-dot"></span>Pool ' + p + '</div>' +
      '<div class="pool-col-hdr"><span>Team</span><span>W-L</span><span>PD</span><span>PF/PA</span></div>' +
      rows + '</div>';
  }).join('');
  document.getElementById('poolGrid').innerHTML = html;
})();

// GAME CARD helper
function gameCardHtml(g) {
  var done = g.completed;
  var t1w = done && g.score1 > g.score2;
  var t2w = done && g.score2 > g.score1;
  var scoreHtml = done
    ? '<div class="game-score ' + (t1w?'w1':t2w?'w2':'') + '">' +
      '<span class="s s1">' + g.score1 + '</span>' +
      '<span class="sep">–</span>' +
      '<span class="s s2">' + g.score2 + '</span></div>'
    : '<div class="game-vs">' + g.time + '</div>';
  var timeHtml = done
    ? '<div class="game-time-label">' + fmtDate(g.date) + ' · ' + g.time + '</div>'
    : '<div class="game-time-label">' + fmtDate(g.date) + '</div>';
  return '<div class="game-card">' +
    '<div class="game-team' + (t1w?' winner':t2w?' loser':'') + '">' +
    logoImg(g.logo1, g.team1, 'game-logo') +
    '<span class="game-name">' + g.team1 + '</span></div>' +
    '<div class="game-score-box">' + scoreHtml + timeHtml + '</div>' +
    '<div class="game-team right' + (t2w?' winner':t1w?' loser':'') + '">' +
    logoImg(g.logo2, g.team2, 'game-logo') +
    '<span class="game-name">' + g.team2 + '</span></div>' +
    '</div>';
}

// SCHEDULE TAB
(function() {
  var el = document.getElementById('scheduleContent');
  var games = STATE_DATA.poolGames;
  if (!games.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-title">Schedule not yet available</div><p>Check back soon.</p></div>';
    return;
  }
  var DOT = {A:'pool-a-dot',B:'pool-b-dot',C:'pool-c-dot',D:'pool-d-dot'};
  var html = ['A','B','C','D'].map(function(p) {
    var pg = games.filter(function(g){return g.pool===p;});
    if (!pg.length) return '';
    return '<div class="section-hdr"><span class="section-dot ' + DOT[p] + '"></span>Pool ' + p + '</div>' +
      pg.map(gameCardHtml).join('');
  }).join('');
  var bGames = STATE_DATA.bracketGames;
  if (bGames.length) {
    html += '<div class="section-hdr"><span class="section-dot bracket-dot"></span>Championship Bracket</div>' +
      bGames.map(gameCardHtml).join('');
  }
  el.innerHTML = html;
})();

// SCORES TAB
(function() {
  var el = document.getElementById('scoresContent');
  var all = STATE_DATA.poolGames.concat(STATE_DATA.bracketGames);
  var done = all.filter(function(g){return g.completed;}).reverse();
  if (!done.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-title">No scores yet</div><p>Check back Friday evening when games begin.</p></div>';
    return;
  }
  el.innerHTML = done.map(function(g) {
    var t1w = g.score1 > g.score2;
    var poolLabel = g.pool ? 'Pool ' + g.pool + ' · ' : '';
    return '<div class="game-card">' +
      '<div class="game-team' + (t1w?' winner':' loser') + '">' +
      logoImg(g.logo1, g.team1, 'game-logo') +
      '<span class="game-name">' + g.team1 + '</span></div>' +
      '<div class="game-score-box">' +
      '<div class="game-score ' + (t1w?'w1':'w2') + '">' +
      '<span class="s s1">' + g.score1 + '</span><span class="sep">–</span><span class="s s2">' + g.score2 + '</span></div>' +
      '<div class="game-time-label">' + poolLabel + fmtDate(g.date) + ' · ' + g.time + '</div>' +
      '</div>' +
      '<div class="game-team right' + (!t1w?' winner':' loser') + '">' +
      logoImg(g.logo2, g.team2, 'game-logo') +
      '<span class="game-name">' + g.team2 + '</span></div>' +
      '</div>';
  }).join('');
})();

// BRACKET TAB
(function() {
  var el = document.getElementById('bracketContent');
  var games = STATE_DATA.bracketGames;
  if (!games.length) {
    el.innerHTML = '<p class="bracket-note">The championship bracket will be set after pool play concludes Saturday morning. Top 2 teams from each pool advance.</p>' +
      '<div class="empty-state"><div class="empty-title">Bracket TBD</div></div>';
    return;
  }
  var html = '<p class="bracket-note">Championship bracket &mdash; top 2 from each pool advance.</p>';
  html += games.map(function(g) {
    var done = g.completed;
    var t1w = done && g.score1 > g.score2;
    var t2w = done && g.score2 > g.score1;
    var t1cls = !done?'tbd':t1w?'winner':'loser';
    var t2cls = !done?'tbd':t2w?'winner':'loser';
    var t1n = g.team1 || 'TBD'; var t2n = g.team2 || 'TBD';
    return '<div class="bracket-card">' +
      '<div class="bracket-row">' +
      '<div class="bracket-team ' + t1cls + '">' + (g.logo1?'<img class="game-logo" src="'+g.logo1+'" alt="'+t1n+'" style="width:24px;height:24px">':'') + '<span>' + t1n + '</span></div>' +
      '<div class="bracket-score' + (done?'':' tbd') + '">' + (done?g.score1:'–') + '</div></div>' +
      '<div class="bracket-row">' +
      '<div class="bracket-team ' + t2cls + '">' + (g.logo2?'<img class="game-logo" src="'+g.logo2+'" alt="'+t2n+'" style="width:24px;height:24px">':'') + '<span>' + t2n + '</span></div>' +
      '<div class="bracket-score' + (done?'':' tbd') + '">' + (done?g.score2:'–') + '</div></div>' +
      '<div class="bracket-time">' + fmtDate(g.date) + ' · ' + g.time + '</div>' +
      '</div>';
  }).join('');
  el.innerHTML = html;
})();
</script>
</body>
</html>
